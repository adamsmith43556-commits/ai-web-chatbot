<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Chat Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 flex items-center justify-center h-screen">
    <div class="bg-white rounded-lg shadow-md w-full max-w-lg">
        <div class="p-4 border-b border-gray-200">
            <h2 class="text-lg font-bold">Chat</h2>
        </div>
        <div id="chat-history" class="p-4 h-96 overflow-y-auto">
            <!-- Chat messages will go here -->
        </div>
        <div class="p-4 border-t border-gray-200">
            <div class="flex">
                <input type="text" id="user-input" class="flex-1 border border-gray-300 rounded-lg p-2" placeholder="Type your message...">
                <button class="ml-2 bg-blue-500 text-white rounded-lg px-4 py-2">Send</button>
            </div>
        </div>
    </div>
</body>
</html>
